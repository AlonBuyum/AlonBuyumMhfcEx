services:
  - type: web
    name: crypto-advisor-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://alon-buyum-mhfc-ex.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: crypto-advisor-db
          property: connectionString

databases:
  - name: crypto-advisor-db
    plan: free
    databaseName: crypto_advisor
    user: crypto_advisor
